<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>ChessChan!</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/cm-chessboard@8.12.12/assets/chessboard.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/cm-chessboard@8.12.12/assets/extensions/arrows/arrows.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/cm-chessboard@8.12.12/assets/extensions/markers/markers.css">

  <link rel="stylesheet" href="./style.css">

  <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>

  <script type="importmap">
  {
    "imports": {
      "chess.js": "https://cdn.jsdelivr.net/npm/chess.js@1.0.0-beta.8/+esm",
      "cm-chessboard/": "https://cdn.jsdelivr.net/npm/cm-chessboard@8.12.12/"
    }
  }
  </script>
</head>

<body>

  <div class="app-container">

    <div id="landing-screen" class="screen active">

      <h1>Chess</h1>
      <p class="subtitle">
        Play locally on one device or challenge a friend online.
      </p>

      <div class="landing-buttons">
        <button id="btn-offline">
          Play Offline
        </button>

        <button id="btn-online">
          Play Online
        </button>
      </div>

    </div>

    <div id="app-screen" class="screen">

      <div class="top-bar">

        <h1 id="app-title">
          Chess
        </h1>

        <div class="dropdown-wrapper">

          <button
            id="hamburger-btn"
            class="icon-btn"
            aria-label="Open menu">
            ☰
          </button>

          <div
            id="dropdown-menu"
            class="dropdown-content hidden">

            <button id="flip-board-btn">
              Flip Board
            </button>

          </div>

        </div>

      </div>

      <div
        id="network-menu"
        class="menu-container hidden">

        <button id="host-btn">
          Host New Game
        </button>

        <div class="join-area">

          <input
            id="join-id"
            type="text"
            placeholder="Enter Game ID..."
            autocomplete="off"
            spellcheck="false">

          <button id="join-btn">
            Join Game
          </button>

        </div>

        <div
          id="game-info"
          class="game-info">
          Not Connected
        </div>

      </div>

      <div id="board"></div>

      <div class="status-container">
        <span id="status">
          Starting game...
        </span>
      </div>

    </div>

  </div>

  <script
    type="module"
    src="./src/main.js">
  </script>

</body>
</html>
